name: Deploy to itch.io

on:
  push:
    tags:
      - 'v*'

# TODO: set these two values before first deploy
env:
  ITCH_USER: "toph_zuko"
  ITCH_GAME: "cat-game"

jobs:
  deploy:
    name: Export and Deploy
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -vp $HOME/.local/share/godot/export_templates/
          TEMPLATES=$(find /root /usr/local -type d -name "*.stable" 2>/dev/null | head -1)
          if [ -z "$TEMPLATES" ]; then echo "ERROR: export templates not found"; exit 1; fi
          cp -r "$TEMPLATES" $HOME/.local/share/godot/export_templates/

      - name: Export for Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push build/web ${{ env.ITCH_USER }}/${{ env.ITCH_GAME }}:html5 \
            --userversion ${{ github.ref_name }}
