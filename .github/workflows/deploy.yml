name: Deploy to itch.io

on:
  push:
    tags:
      - 'v*'

env:
  ITCH_USER: "toph_zuko"
  ITCH_GAME: "cat-game"

jobs:
  export:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -vp $HOME/.local/share/godot/export_templates/
          TEMPLATES=$(find /root /usr/local -type d -name "*.stable" 2>/dev/null | head -1)
          if [ -z "$TEMPLATES" ]; then echo "ERROR: export templates not found"; exit 1; fi
          cp -r "$TEMPLATES" $HOME/.local/share/godot/export_templates/

      - name: Export for Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

  deploy:
    name: Deploy to itch.io
    needs: export
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/

      - name: Install butler
        run: |
          BUTLER_VERSION=$(curl -s "https://api.github.com/repos/itchio/butler/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": "\(.*\)".*/\1/')
          curl -L -o butler.zip "https://github.com/itchio/butler/releases/download/${BUTLER_VERSION}/butler-linux-amd64.zip"
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push build/web/ ${{ env.ITCH_USER }}/${{ env.ITCH_GAME }}:html5 \
            --userversion ${{ github.ref_name }}
